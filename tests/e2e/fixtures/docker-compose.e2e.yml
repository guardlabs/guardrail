services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: guardrail
      POSTGRES_USER: guardrail
      POSTGRES_PASSWORD: guardrail
    ports:
      - "0:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardrail -d guardrail"]
      interval: 2s
      timeout: 5s
      retries: 20
