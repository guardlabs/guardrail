services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-wallet-postgres
    environment:
      POSTGRES_DB: agent_wallet
      POSTGRES_USER: agent_wallet
      POSTGRES_PASSWORD: agent_wallet
    ports:
      - "5432:5432"
    volumes:
      - agent_wallet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_wallet -d agent_wallet"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agent_wallet_postgres_data:
