services:
  postgres:
    image: postgres:16-alpine
    container_name: conduit-postgres
    environment:
      POSTGRES_DB: conduit
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: conduit
    ports:
      - "5432:5432"
    volumes:
      - conduit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conduit -d conduit"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  conduit_postgres_data:
